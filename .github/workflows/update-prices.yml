name: Update price data

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours UTC (keeps S&P/Gold compare data reasonably fresh vs BTC's live top-up)
  workflow_dispatch:        # allow manual runs from GitHub UI

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance

      - name: Fetch price data
        run: python fetch_data.py --force

      - name: Commit updated prices
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.js data/prices-compare.js
          git diff --cached --quiet || git commit -m "chore: update price data $(date -u +%Y-%m-%d)"
          git push
